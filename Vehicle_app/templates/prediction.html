<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Vehicle Analyzer</title>

<link rel="stylesheet" href="/static/style.css">

</head>


<body>


<div class="container">


<h1>
Prediction Result
</h1>


<img class="preview"
src="{{ url_for('static', filename=image) }}"
alt="Uploaded Image"
width="400">



<h2>

Vehicle:

<span>
{{prediction}}
</span>

</h2>



<h2>

Confidence:

<span>
{{confidence}} %

</span>

</h2>



<a href="/">
Upload New Image
</a>


</div>


</body>

</html>
